name: Deploy Web (PWA) to GitHub Pages

# 推送到 main 分支即自动构建 Flutter Web 并发布到 GitHub Pages。
# 之后在 iPhone Safari 打开 Pages 地址 → 分享 → 添加到主屏幕，即可得到桌面图标 App。
# （项目页地址形如 https://<你的用户名>.github.io/<仓库名>/ ，base-href 已自动按仓库名注入。）
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - run: flutter config --enable-web
      - run: flutter pub get

      # 仓库里只提交共享代码（未包含 web/ 平台目录），CI 先生成 web 入口再构建
      - name: Ensure web entry exists
        run: flutter create --platforms=web .

      - name: Build web release
        run: flutter build web --release --base-href="/${{ github.event.repository.name }}/"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
