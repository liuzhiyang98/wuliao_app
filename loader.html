<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="吾俩">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="吾俩">
  <title>吾俩</title>
  <style>
    body { margin: 0; background: #FFF; overflow: hidden; }
    #loading {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-family: -apple-system, sans-serif; color: #666;
    }
  </style>
</head>
<body>
  <div id="loading">正在加载...</div>
  <script>
    var CDN = 'https://cdn.jsdelivr.net/gh/liuzhiyang98/wuliao_app@gh-pages';
    
    // Dynamically load flutter_bootstrap.js which handles everything else
    var s = document.createElement('script');
    s.src = CDN + '/flutter_bootstrap.js';
    s.onload = function() { document.getElementById('loading').style.display = 'none'; };
    s.onerror = function() { document.getElementById('loading').textContent = '加载失败，请刷新重试'; };
    document.body.appendChild(s);
  </script>
</body>
</html>
