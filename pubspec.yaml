name: wuliao
description: 双人专属情侣 App（实时位置 + 共享回忆），仅两人使用，无会员付费。
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  supabase_flutter: ^2.5.0
  geolocator: ^11.0.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  sqflite: ^2.3.3
  path_provider: ^2.1.3
  image_picker: ^1.1.2
  go_router: ^14.2.0
  intl: ^0.19.0
  uuid: ^4.4.0
  http: ^1.2.0
  flutter_secure_storage: ^9.2.0
  background_locator_2: ^2.0.6
  flutter_local_notifications: ^17.2.0
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
