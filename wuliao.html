<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="吾俩 - 情侣App">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="吾俩">
  <title>吾俩</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    #loading {
      text-align: center; color: white;
    }
    #loading .spinner {
      width: 40px; height: 40px; border: 3px solid rgba(255,255,255,.3);
      border-top-color: white; border-radius: 50%;
      animation: spin .8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size: 14px; opacity: .8; }
    #error { color: #ff6b6b; text-align: center; padding: 20px; }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="loading"><div class="spinner"></div><p>正在加载吾俩...</p></div>
  <script>
    // Set the CDN base URL BEFORE loading flutter_bootstrap
    var CDN = 'https://cdn.jsdelivr.net/gh/liuzhiyang98/wuliao_app@gh-pages';
    
    window._flutter = {
      buildConfig: {
        engineRevision: 'a18df97ca57a249df5d8d68cd0820600223ce262',
        builds: [{
          compileTarget: 'dart2js',
          renderer: 'canvaskit',
          mainJsPath: 'main.dart.js'
        }]
      },
      loader: null  // will be set by flutter_bootstrap
    };
    
    // Load flutter_bootstrap from CDN
    var s = document.createElement('script');
    s.src = CDN + '/flutter_bootstrap.js';
    s.onerror = function() {
      document.getElementById('loading').outerHTML = 
        '<div id=error><h2>加载失败</h2><p>请检查网络连接后刷新页面</p></div>';
    };
    
    s.onload = function() {
      // After bootstrap loads, configure and start Flutter with CDN paths
      window._flutter.loader.load({
        config: { entryPointBaseUrl: CDN + '/' },
        onEntrypointLoaded: async function(engineInitializer) {
          // Hide loading when engine is ready
          document.getElementById('loading').style.display = 'none';
          // Initialize and run app
          var appRunner = await engineInitializer.initializeEngine({
            hostElement: document.body,
            assetBase: CDN + '/'
          });
          await appRunner.runApp();
        }
      }).catch(function(err) {
        console.error('Flutter error:', err);
        document.getElementById('loading').innerHTML = 
          '<p style=color:#ff6b6b>加载出错: ' + err.message + '</p>';
      });
    };
    document.head.appendChild(s);
  </script>
</body>
</html>
